<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fitness - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container auth-box">
        <h1 style="text-align: center; margin-bottom: 20px;">AI Fitness Coach</h1>
        
        <div class="form-toggle">
            <button id="toggle-login" class="active-tab" onclick="switchForm('login')">Login</button>
            <button id="toggle-register" onclick="switchForm('register')">Register</button>
        </div>

        <form id="login-form" action="/auth/login" method="POST">
            <h3 style="margin-bottom: 15px;">Sign In</h3>
            <div class="form-group">
                <label>Email Address:</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 5px;">Sign In</button>
        </form>

        <form id="register-form" action="/auth/register" method="POST" style="display: none;">
            <h3 style="margin-bottom: 15px;">Create Account</h3>
            <div class="form-group">
                <label>Email Address:</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" required minlength="6">
            </div>

            <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 5px;">Sign Up</button>
        </form>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-card">
            <div class="loader-dots-container">
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
            </div>
            <p>Loading, please wait...</p>
        </div>
    </div>

    <script>
        function switchForm(type) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const loginBtn = document.getElementById('toggle-login');
            const registerBtn = document.getElementById('toggle-register');

            if (type === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                loginBtn.classList.add('active-tab');
                registerBtn.classList.remove('active-tab');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                loginBtn.classList.remove('active-tab');
                registerBtn.classList.add('active-tab');
            }
        }

        function showLoadingOverlay() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.classList.add('active');
        }

        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', showLoadingOverlay);
        });
    </script>
</body>
</html>
