<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Your Profile</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-card">
            <div class="loader-dots-container">
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
            </div>
            <p>Preparing your goals...</p>
        </div>
    </div>

    <div class="container setup-box">
        <h2 style="margin-bottom: 20px; text-align: center;">{{ title or 'Tell Us About Yourself' }}</h2>
        <form action="/onboard/submit" method="POST">
            <input type="hidden" name="uid" value="{{ uid }}">
            <input type="hidden" name="email" value="{{ email }}">

            <div class="form-group">
                <label>Age:</label>
                <input type="number" name="age" value="{{ age or '' }}" required min="1" max="120">
            </div>

            <div class="form-group">
                <label>Biological Sex:</label>
                <select name="sex" required>
                    <option value="Male" {% if sex == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if sex == 'Female' %}selected{% endif %}>Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Height (cm):</label>
                <input type="number" name="height" step="0.1" value="{{ height or '' }}" required>
            </div>

            <div class="form-group">
                <label>Current Weight (kg):</label>
                <input type="number" name="weight" step="0.1" value="{{ weight or '' }}" required>
            </div>

            <div class="form-group">
                <label>Target Weight (kg):</label>
                <input type="number" name="target_weight" step="0.1" value="{{ target_weight or '' }}" required>
                <small style="color: var(--text-muted);">This is as important as your target timeline for goal planning.</small>
            </div>

            <div class="form-group">
                <label>Activity Level:</label>
                <select name="activity_level" required>
                    <option value="Sedentary" {% if activity_level == 'Sedentary' %}selected{% endif %}>Sedentary (Little to no exercise)</option>
                    <option value="Lightly Active" {% if activity_level == 'Lightly Active' %}selected{% endif %}>Lightly Active (1-3 days/week)</option>
                    <option value="Moderately Active" {% if activity_level == 'Moderately Active' %}selected{% endif %}>Moderately Active (3-5 days/week)</option>
                    <option value="Very Active" {% if activity_level == 'Very Active' %}selected{% endif %}>Very Active (6-7 days/week)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Target Timeline (e.g., "12 weeks", "by Dec 2026"):</label>
                <input type="text" name="timeline" placeholder="e.g., 10 weeks" value="{{ timeline or '' }}" required>
            </div>

            <div class="form-group">
                <label>Personal Context & Fitness Goals:</label>
                <textarea name="context" rows="4" placeholder="Mention any health history, past weight loss milestones, or specific goals..." required>{{ context or '' }}</textarea>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; margin-top: 10px;">{{ button_label or 'Generate AI Strategy' }}</button>
        </form>
    </div>

    <script>
        function showLoadingOverlay() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.classList.add('active');
        }

        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', showLoadingOverlay);
        });
    </script>
</body>
</html>
