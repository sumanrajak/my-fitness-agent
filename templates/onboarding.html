<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Your Profile</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h2>Tell Us About Yourself</h2>
        <form action="/onboard/submit" method="POST">
            <input type="hidden" name="uid" value="{{ uid }}">
            <input type="hidden" name="email" value="{{ email }}">

            <label>Age:</label>
            <input type="number" name="age" required min="1" max="120">

            <label>Biological Sex:</label>
            <select name="sex" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label>Height (cm):</label>
            <input type="number" name="height" step="0.1" required>

            <label>Current Weight (kg):</label>
            <input type="number" name="weight" step="0.1" required>

            <label>Activity Level:</label>
            <select name="activity_level" required>
                <option value="Sedentary">Sedentary (Little to no exercise)</option>
                <option value="Lightly Active">Lightly Active (1-3 days/week)</option>
                <option value="Moderately Active">Moderately Active (3-5 days/week)</option>
                <option value="Very Active">Very Active (6-7 days/week)</option>
            </select>

            <label>Target Timeline (e.g., "12 weeks", "by Dec 2026"):</label>
            <input type="text" name="timeline" placeholder="e.g., 10 weeks" required>

            <label>Personal Context & Fitness Goals:</label>
            <textarea name="context" rows="4" placeholder="Mention any health history, past weight loss milestones, or specific goals..." required></textarea>

            <button type="submit">Generate AI Strategy</button>
        </form>
    </div>
</body>
</html>
